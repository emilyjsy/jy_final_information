
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📇 1분 요약 카드 - 시험 직전 빈칸 점검</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f7f4;
    --surface: #ffffff;
    --border: #e0ddd8;
    --text: #1a1816;
    --text2: #5a5650;
    --text3: #8a857d;
    --accent: #2563eb;
    --accent-soft: #dbeafe;
    --success: #22c06b;
    --success-soft: #d1fae5;
    --danger: #e0533d;
    --danger-soft: #fee2e2;
    --warning: #f59e0b;
    --warning-soft: #fef3c7;
    --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.08);
  }
  [data-theme="dark"] {
    --bg: #1a1816;
    --surface: #2a2725;
    --border: #3d3935;
    --text: #f5f3f0;
    --text2: #b8b3ab;
    --text3: #8a857d;
    --accent: #60a5fa;
    --accent-soft: #1e3a8a;
    --success: #34d399;
    --success-soft: #064e3b;
    --danger: #f87171;
    --danger-soft: #7f1d1d;
    --warning: #fbbf24;
    --warning-soft: #78350f;
    --shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.5);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    padding: 20px;
    min-height: 100vh;
    transition: background .3s, color .3s;
  }
  .container { max-width: 900px; margin: 0 auto; }

  /* 헤더 */
  header {
    background: var(--surface);
    border-radius: 16px;
    padding: 28px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-left .badge {
    display: inline-block;
    padding: 5px 12px;
    background: var(--text);
    color: var(--surface);
    border-radius: 30px;
    font-size: 12px;
    font-weight: 700;
    margin-bottom: 8px;
  }
  h1 {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -0.03em;
  }
  .subtitle {
    font-size: 14px;
    color: var(--text2);
    margin-top: 4px;
  }
  .theme-toggle {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 8px 16px;
    cursor: pointer;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
  }
  .theme-toggle:hover { background: var(--accent-soft); }

  /* 단원 선택 탭 */
  .tabs {
    background: var(--surface);
    border-radius: 16px;
    padding: 14px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    flex-wrap: wrap;
  }
  .tab {
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 10px 18px;
    border-radius: 50px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    font-family: inherit;
    transition: all .2s;
  }
  .tab:hover { border-color: var(--accent); }
  .tab.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
  }

  /* 진행 상태 */
  .progress-wrap {
    background: var(--surface);
    border-radius: 16px;
    padding: 18px 22px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }
  .progress-info {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    font-size: 14px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .progress-info .left { color: var(--text2); }
  .progress-info strong { color: var(--text); }
  .timer {
    background: var(--accent-soft);
    color: var(--accent);
    padding: 4px 12px;
    border-radius: 50px;
    font-weight: 700;
    font-size: 13px;
  }
  .timer.warning {
    background: var(--warning-soft);
    color: var(--warning);
  }
  .timer.danger {
    background: var(--danger-soft);
    color: var(--danger);
  }
  .progress-bar {
    height: 8px;
    background: var(--bg);
    border-radius: 50px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--success));
    transition: width .4s;
    width: 0;
  }

  /* 액션 버튼 */
  .actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .btn {
    padding: 9px 16px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    font-family: inherit;
    transition: all .2s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-danger { color: var(--danger); }
  .btn-danger:hover { background: var(--danger-soft); border-color: var(--danger); }

  /* 카드 */
  .card {
    background: var(--surface);
    border-radius: 16px;
    padding: 32px;
    box-shadow: var(--shadow-lg);
    margin-bottom: 20px;
    border-top: 6px solid var(--accent);
    position: relative;
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .card-num {
    font-size: 12px;
    font-weight: 700;
    color: var(--text3);
    letter-spacing: 0.05em;
    margin-bottom: 4px;
  }
  .card-title {
    font-size: 24px;
    font-weight: 900;
    letter-spacing: -0.02em;
  }
  .bookmark-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 24px;
    color: var(--text3);
    padding: 0;
  }
  .bookmark-btn.active { color: var(--warning); }

  .section {
    margin-bottom: 22px;
    padding-bottom: 22px;
    border-bottom: 1px dashed var(--border);
  }
  .section:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
  }
  .section-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--text2);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-content {
    font-size: 15px;
    line-height: 2;
    color: var(--text);
  }
  .section-content ul { padding-left: 20px; margin: 6px 0; }
  .section-content li { margin-bottom: 4px; }
  .section-content table {
    width: 100%;
    border-collapse: collapse;
    margin: 8px 0;
    font-size: 14px;
  }
  .section-content th, .section-content td {
    padding: 8px 10px;
    border: 1px solid var(--border);
    text-align: left;
  }
  .section-content th {
    background: var(--bg);
    font-weight: 700;
    color: var(--text2);
  }

  /* 빈칸 입력 */
  .blank {
    display: inline-block;
    position: relative;
    margin: 0 2px;
  }
  .blank input {
    background: var(--bg);
    border: 2px dashed var(--border);
    border-radius: 6px;
    padding: 2px 8px;
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    text-align: center;
    min-width: 70px;
    width: auto;
    transition: all .2s;
    font-weight: 600;
  }
  .blank input:focus {
    outline: none;
    border-color: var(--accent);
    background: var(--accent-soft);
  }
  .blank input.correct {
    background: var(--success-soft);
    border: 2px solid var(--success);
    color: var(--success);
    font-weight: 700;
  }
  .blank input.wrong {
    background: var(--danger-soft);
    border: 2px solid var(--danger);
    color: var(--danger);
    font-weight: 700;
  }
  .blank input.revealed {
    background: var(--warning-soft);
    border: 2px solid var(--warning);
    color: var(--warning);
    font-weight: 700;
  }
  .hint-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text3);
    font-size: 12px;
    padding: 0 4px;
    vertical-align: middle;
    transition: color .2s;
  }
  .hint-btn:hover { color: var(--accent); }
  .hint-btn.used { color: var(--warning); }

  /* 결과 카드 */
  .result-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 30px;
    box-shadow: var(--shadow-lg);
    text-align: center;
    margin-bottom: 20px;
    display: none;
    border-top: 6px solid var(--success);
  }
  .result-card.show { display: block; }
  .result-emoji { font-size: 48px; margin-bottom: 8px; }
  .result-score {
    font-size: 40px;
    font-weight: 900;
    color: var(--accent);
    margin: 8px 0;
  }
  .result-detail {
    color: var(--text2);
    margin-bottom: 16px;
    font-size: 14px;
  }

  /* 안내 문구 */
  .hint-guide {
    background: var(--accent-soft);
    color: var(--accent);
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 16px;
    line-height: 1.6;
  }

  @media (max-width: 600px) {
    body { padding: 12px; }
    h1 { font-size: 20px; }
    .card { padding: 22px; }
    .card-title { font-size: 20px; }
    .blank input { min-width: 60px; font-size: 13px; }
  }
</style>
</head>
<body>
<div class="container">

<header>
  <div class="header-left">
    <span class="badge">1-MIN REVIEW</span>
    <h1>📇 1분 요약 카드</h1>
    <div class="subtitle">시험 직전 빈칸 채우기로 핵심만 빠르게 점검</div>
  </div>
  <button class="theme-toggle" id="themeToggle">🌙 다크모드</button>
</header>

<div class="hint-guide">
  💡 <strong>사용법</strong>: 빈칸을 클릭해서 직접 답을 입력하세요. 입력 후 Enter나 빈칸 밖 클릭으로 정답이 즉시 확인됩니다. 모르겠으면 빈칸 옆 <strong>?</strong> 버튼으로 첫 글자 힌트를 볼 수 있어요.
</div>

<div class="tabs" id="tabs">
  <button class="tab active" data-unit="1">1. 컴퓨팅 시스템</button>
  <button class="tab" data-unit="2">2. 데이터</button>
  <button class="tab" data-unit="3">3. 알고리즘·프로그래밍</button>
  <button class="tab" data-unit="4">4. 인공지능</button>
  <button class="tab" data-unit="5">5. 정보 보호와 보안</button>
</div>

<div class="progress-wrap">
  <div class="progress-info">
    <span class="left">진행: <strong id="progressText">0 / 0</strong> · 정답: <strong id="correctText" style="color:var(--success)">0</strong> · 오답: <strong id="wrongText" style="color:var(--danger)">0</strong></span>
    <span class="timer" id="timer">⏱ 1:00</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="actions">
  <button class="btn" id="revealAllBtn">👁️ 정답 모두 보기</button>
  <button class="btn" id="timerBtn">⏱ 타이머 ON/OFF</button>
  <button class="btn btn-danger" id="resetBtn">🔄 다시 풀기</button>
</div>

<div class="result-card" id="resultCard"></div>

<div id="cardContainer"></div>

</div>

<script>
// ========= 카드 데이터 =========
// 정답은 배열로 (유사답안 모두 인정). 첫 번째가 대표 정답.
const CARDS = {
  1: {
    title: "컴퓨팅 시스템 (네트워크 + IoT)",
    sections: [
      {
        title: "🎯 한 줄 요약",
        type: "html",
        content: `이 단원은 컴퓨터들이 어떻게 연결되고(<b>{B1}</b>), 사물에 센서를 붙여 정보를 주고받는 <b>{B2}</b>(IoT)에 대해 다룬다.`,
        blanks: {
          B1: ["네트워크"],
          B2: ["사물 인터넷", "사물인터넷", "IoT"]
        }
      },
      {
        title: "🔑 핵심 키워드 (네트워크)",
        type: "html",
        content: `
          <ul>
            <li><b>패킷</b>: 데이터를 적당한 크기로 자른 <b>{B1}</b> 단위. 각 패킷은 <b>{B2}</b>(받는사람) 주소를 가지고 다른 경로로 전송될 수 있음.</li>
            <li><b>{B3}</b>: 외부 네트워크와 제일 먼저 접속하는 장치. 컴퓨터 본체의 확장 슬롯에 꽂음.</li>
            <li><b>스위치</b>: <b>{B4}</b> 네트워크에서 여러 기기를 연결하는 장치.</li>
            <li><b>{B5}</b>: 데이터 패킷의 가장 적절한 경로를 결정하는 장치.</li>
            <li><b>프로토콜</b>: 컴퓨터 간 통신을 위한 <b>{B6}</b>(규약).</li>
            <li><b>IP 주소</b>: 컴퓨터의 <b>{B7}</b> 주소.</li>
          </ul>`,
        blanks: {
          B1: ["최소 전송", "최소전송", "전송"],
          B2: ["수신자", "받는사람"],
          B3: ["랜 카드", "랜카드", "LAN 카드", "LAN카드"],
          B4: ["소규모"],
          B5: ["라우터"],
          B6: ["약속", "규약"],
          B7: ["고유"]
        }
      },
      {
        title: "⚖️ 헷갈리는 짝꿍 - 네트워크 범위 (작은 → 큰 순)",
        type: "html",
        content: `
          <table>
            <tr><th>분류</th><th>범위</th><th>예시</th></tr>
            <tr><td><b>{B1}</b></td><td>수 m (개인 영역)</td><td>{B2}, 에어드랍</td></tr>
            <tr><td><b>{B3}</b></td><td>건물 내부</td><td>학교, 회사</td></tr>
            <tr><td><b>{B4}</b></td><td>{B5} 단위</td><td>도시 내</td></tr>
            <tr><td><b>WAN</b></td><td>{B6}</td><td>도시를 벗어남</td></tr>
          </table>`,
        blanks: {
          B1: ["PAN"],
          B2: ["블루투스"],
          B3: ["LAN"],
          B4: ["MAN"],
          B5: ["도시"],
          B6: ["광역", "도시 벗어남"]
        }
      },
      {
        title: "🔑 핵심 키워드 (IoT 동작 원리 DNPC)",
        type: "html",
        content: `
          <ul>
            <li>D: <b>{B1}</b> 수집 (센서가 측정)</li>
            <li>N: <b>{B2}</b> 전달 (네트워크로 전송)</li>
            <li>P: 데이터 <b>{B3}</b> 및 분석 (판단)</li>
            <li>C: <b>{B4}</b> 제공 (사용자에게 알림/작동)</li>
          </ul>`,
        blanks: {
          B1: ["데이터", "Data"],
          B2: ["데이터", "Data"],
          B3: ["처리", "Process"],
          B4: ["서비스", "Service"]
        }
      },
      {
        title: "⚠️ 시험 함정 포인트",
        type: "html",
        content: `
          <ul>
            <li>"패킷은 <b>{B1}</b> 같은 경로로 전송된다" → ❌ 함정! 다른 경로로도 갈 수 있음</li>
            <li>IoT는 사람 명령 <b>{B2}</b>도 자동 작동 가능 (없이/있어야)</li>
            <li>'결제 정보 <b>{B3}</b>' 키워드도 사용자 체감 결과면 → C(서비스 제공)</li>
            <li>MAN ≠ WAN! M(etro)=도시 내, W(ide)=도시 <b>{B4}</b></li>
          </ul>`,
        blanks: {
          B1: ["반드시", "항상", "모두"],
          B2: ["없이"],
          B3: ["기록"],
          B4: ["벗어남", "벗어난"]
        }
      },
      {
        title: "💡 암기 꿀팁",
        type: "html",
        content: `
          <ul>
            <li>IoT 순서: <b>D → N → P → C</b> ("디엔피씨")로 외우기</li>
            <li>동사 매칭: 측정=<b>{B1}</b>, 전송=<b>{B2}</b>, 분석=<b>{B3}</b>, 알림=<b>{B4}</b></li>
            <li>장치 키워드: '경로 결정'=<b>{B5}</b>, '꽂는 카드'=랜카드, '소규모 연결'=스위치</li>
          </ul>`,
        blanks: {
          B1: ["D"],
          B2: ["N"],
          B3: ["P"],
          B4: ["C"],
          B5: ["라우터"]
        }
      }
    ]
  },

  2: {
    title: "데이터 (디지털 데이터 압축)",
    sections: [
      {
        title: "🎯 한 줄 요약",
        type: "html",
        content: `이 단원은 디지털 데이터를 더 <b>{B1}</b> 용량으로 만드는 <b>{B2}</b>의 방법(무손실/손실)과 활용에 대해 다룬다.`,
        blanks: {
          B1: ["작은", "적은"],
          B2: ["압축", "데이터 압축"]
        }
      },
      {
        title: "🔑 핵심 키워드",
        type: "html",
        content: `
          <ul>
            <li><b>압축</b>: 원본보다 <b>{B1}</b> 용량으로 만드는 작업</li>
            <li><b>복원</b>: 압축한 데이터를 <b>{B2}</b>대로 만드는 것</li>
            <li><b>압축률</b>: 변환 전후 데이터 크기 <b>{B3}</b> (높을수록 잘 압축됨)</li>
            <li><b>{B4}</b>(RLE): 동일 데이터의 반복 횟수를 기록하여 짧게 만드는 무손실 압축 방식 (예: BMP)</li>
            <li><b>정형 데이터</b>: 행과 열로 표현 가능한 데이터 (예: <b>{B5}</b>)</li>
            <li><b>비정형 데이터</b>: 형식이 정해지지 않은 데이터 (예: <b>{B6}</b>, 소리, 영상)</li>
          </ul>`,
        blanks: {
          B1: ["작은", "적은"],
          B2: ["원래", "원본"],
          B3: ["비율"],
          B4: ["런 길이 부호화", "런길이 부호화", "런길이부호화", "RLE"],
          B5: ["엑셀", "표", "테이블"],
          B6: ["이미지", "사진", "문자", "텍스트"]
        }
      },
      {
        title: "⚖️ 헷갈리는 짝꿍 - 무손실 vs 손실 압축",
        type: "html",
        content: `

            <li>강력한 비밀번호: <b>{B4}</b>자리 이상, <b>{B5}</b>종 이상 문자 혼합</li>
            <li>생일·전화번호 사용은 강력한 비밀번호 <b>{B6}</b>!</li>
          </ul>`,
        blanks: {
          B1: ["랜섬웨어"],
          B2: ["웜"],
          B3: ["기술"],
          B4: ["8", "여덟"],
          B5: ["3", "세"],
          B6: ["X", "아님", "아니다"]
        }
      },
      {
        title: "💡 암기 꿀팁",
        type: "html",
        content: `
          <ul>
            <li>5종 악성코드 핵심 동사: 바이러스=<b>{B1}</b>, 웜=복제, 트로이=<b>{B2}</b>, 스파이=정보수집, 랜섬=<b>{B3}</b>+금전</li>
            <li>3종 보안기술 키워드: 암호화=<b>{B4}</b>, 방화벽=<b>{B5}</b> 차단, 전자서명=신원 확인</li>
            <li>위험 평가(사고 <b>{B6}</b>) vs 사고 대응 계획(사고 <b>{B7}</b>) vs 보안 모니터링(<b>{B8}</b> 감시)</li>
          </ul>`,
        blanks: {
          B1: ["삽입"],
          B2: ["위장"],
          B3: ["암호화"],
          B4: ["변환"],
          B5: ["침입"],
          B6: ["전"],
          B7: ["후"],
          B8: ["실시간"]
        }
      }
    ]
  }
};

// ========= 상태 관리 =========
let state = {
  currentUnit: 1,
  answers: {},  // {unit: {sectionIdx: {blankKey: 'correct'|'wrong'|'revealed'|'hint'}}}
  bookmarks: new Set(),
  timerActive: false,
  timeLeft: 60,
  timerInterval: null,
  revealedAll: false
};

// ========= 초기화 =========
function init() {
  document.getElementById('themeToggle').addEventListener('click', toggleTheme);
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      state.currentUnit = parseInt(tab.dataset.unit);
      state.revealedAll = false;
      document.getElementById('revealAllBtn').classList.remove('active');
      document.getElementById('revealAllBtn').textContent = '👁️ 정답 모두 보기';
      resetTimer();
      renderCard();
    });
  });

  document.getElementById('revealAllBtn').addEventListener('click', toggleRevealAll);
  document.getElementById('timerBtn').addEventListener('click', toggleTimer);
  document.getElementById('resetBtn').addEventListener('click', () => {
    if (confirm('현재 단원 카드의 답안을 모두 초기화할까요?')) {
      resetCurrentCard();
    }
  });

  renderCard();
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeToggle').textContent = isDark ? '🌙 다크모드' : '☀️ 라이트모드';
}

function renderCard() {
  const card = CARDS[state.currentUnit];
  const container = document.getElementById('cardContainer');
  const isBookmarked = state.bookmarks.has(state.currentUnit);

  let html = `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-num">UNIT ${state.currentUnit}</div>
          <div class="card-title">${card.title}</div>
        </div>
        <button class="bookmark-btn ${isBookmarked ? 'active' : ''}" onclick="toggleBookmark()">
          ${isBookmarked ? '⭐' : '☆'}
        </button>
      </div>
  `;

  card.sections.forEach((section, sIdx) => {
    html += `
      <div class="section">
        <div class="section-title">${section.title}</div>
        <div class="section-content">${renderSectionContent(section, sIdx)}</div>
      </div>
    `;
  });

  html += '</div>';
  container.innerHTML = html;

  attachInputHandlers();
  updateProgress();
}

function renderSectionContent(section, sIdx) {
  let html = section.content;
  Object.keys(section.blanks).forEach(blankKey => {
    const answers = section.blanks[blankKey];
    const correctAns = answers[0];
    const inputId = `blank-${state.currentUnit}-${sIdx}-${blankKey}`;
    const minWidth = Math.max(60, correctAns.length * 12);
    const inputHtml = `
      <span class="blank">
        <input
          type="text"
          id="${inputId}"
          data-section="${sIdx}"
          data-blank="${blankKey}"
          data-answers='${JSON.stringify(answers)}'
          autocomplete="off"
          spellcheck="false"
          style="min-width: ${minWidth}px"
        >
        <button type="button" class="hint-btn" onclick="showHint('${inputId}')" title="첫 글자 힌트">?</button>
      </span>
    `;
    html = html.replace(`{${blankKey}}`, inputHtml);
  });
  return html;
}

function attachInputHandlers() {
  const card = CARDS[state.currentUnit];

  document.querySelectorAll('input[type="text"]').forEach(input => {
    const sIdx = input.dataset.section;
    const blankKey = input.dataset.blank;

    // 저장된 상태 복원
    const savedAns = state.answers[state.currentUnit]?.[sIdx]?.[blankKey];
    if (savedAns) {
      if (savedAns.status === 'correct') {
        input.value = savedAns.value;
        input.classList.add('correct');
        input.disabled = true;
      } else if (savedAns.status === 'revealed') {
        const answers = JSON.parse(input.dataset.answers);
        input.value = answers[0];
        input.classList.add('revealed');
        input.disabled = true;
      }
    }

    if (state.revealedAll && !input.disabled) {
      const answers = JSON.parse(input.dataset.answers);
      input.value = answers[0];
      input.classList.add('revealed');
      input.disabled = true;
    }

    input.addEventListener('blur', () => checkAnswer(input));
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        checkAnswer(input);
        // 다음 빈칸으로 포커스 이동
        const inputs = Array.from(document.querySelectorAll('input[type="text"]:not(:disabled)'));
        const currentIdx = inputs.indexOf(input);
        if (currentIdx >= 0 && currentIdx < inputs.length - 1) {
          inputs[currentIdx + 1].focus();
        }
      }
    });
  });
}

function checkAnswer(input) {
  if (input.disabled) return;
  const value = input.value.trim();
  if (!value) return;

  const answers = JSON.parse(input.dataset.answers);
  const sIdx = input.dataset.section;
  const blankKey = input.dataset.blank;

  // 정규화: 공백 제거 후 비교
  const normalize = s => s.replace(/\s+/g, '').toLowerCase();
  const normalizedValue = normalize(value);
  const isCorrect = answers.some(ans => normalize(ans) === normalizedValue);

  if (!state.answers[state.currentUnit]) state.answers[state.currentUnit] = {};
  if (!state.answers[state.currentUnit][sIdx]) state.answers[state.currentUnit][sIdx] = {};

  if (isCorrect) {
    input.classList.remove('wrong');
    input.classList.add('correct');
    input.disabled = true;
    state.answers[state.currentUnit][sIdx][blankKey] = { status: 'correct', value: value };
  } else {
    input.classList.remove('correct');
    input.classList.add('wrong');
    // 정답 자동 표시 (1초 후)
    setTimeout(() => {
      input.value = answers[0];
      input.classList.remove('wrong');
      input.classList.add('revealed');
      input.disabled = true;
      state.answers[state.currentUnit][sIdx][blankKey] = { status: 'revealed', value: answers[0] };
      updateProgress();
    }, 1000);
  }
  updateProgress();
}

function showHint(inputId) {
  const input = document.getElementById(inputId);
  if (input.disabled) return;
  const answers = JSON.parse(input.dataset.answers);
  const firstChar = answers[0].charAt(0);
  input.value = firstChar;
  input.focus();
  // 커서를 끝으로
  input.setSelectionRange(input.value.length, input.value.length);
  // 힌트 버튼 사용 표시
  input.parentElement.querySelector('.hint-btn').classList.add('used');
}

function toggleRevealAll() {
  state.revealedAll = !state.revealedAll;
  const btn = document.getElementById('revealAllBtn');
  if (state.revealedAll) {
    btn.classList.add('active');
    btn.textContent = '🙈 빈칸으로 돌리기';
    document.querySelectorAll('input[type="text"]').forEach(input => {
      if (!input.disabled) {
        const answers = JSON.parse(input.dataset.answers);
        input.value = answers[0];
        input.classList.add('revealed');
        input.disabled = true;
      }
    });
  } else {
    btn.classList.remove('active');
    btn.textContent = '👁️ 정답 모두 보기';
    document.querySelectorAll('input[type="text"]').forEach(input => {
      const sIdx = input.dataset.section;
      const blankKey = input.dataset.blank;
      const savedAns = state.answers[state.currentUnit]?.[sIdx]?.[blankKey];
      // 저장된 답이 없는 빈칸만 다시 비움
      if (!savedAns) {
        input.value = '';
        input.classList.remove('revealed');
        input.disabled = false;
      }
    });
  }
  updateProgress();
}

function toggleBookmark() {
  if (state.bookmarks.has(state.currentUnit)) {
    state.bookmarks.delete(state.currentUnit);
  } else {
    state.bookmarks.add(state.currentUnit);
  }
  renderCard();
}

function resetCurrentCard() {
  if (state.answers[state.currentUnit]) {
    delete state.answers[state.currentUnit];
  }
  state.revealedAll = false;
  document.getElementById('revealAllBtn').classList.remove('active');
  document.getElementById('revealAllBtn').textContent = '👁️ 정답 모두 보기';
  document.getElementById('resultCard').classList.remove('show');
  resetTimer();
  renderCard();
}

function updateProgress() {
  const card = CARDS[state.currentUnit];
  let total = 0, correct = 0, wrong = 0;
  card.sections.forEach((section, sIdx) => {
    Object.keys(section.blanks).forEach(blankKey => {
      total++;
      const ans = state.answers[state.currentUnit]?.[sIdx]?.[blankKey];
      if (ans?.status === 'correct') correct++;
      else if (ans?.status === 'revealed') wrong++;
    });
  });

  const answered = correct + wrong;
  document.getElementById('progressText').textContent = `${answered} / ${total}`;
  document.getElementById('correctText').textContent = correct;
  document.getElementById('wrongText').textContent = wrong;
  document.getElementById('progressFill').style.width = total > 0 ? `${(answered / total) * 100}%` : '0%';

  // 완료 시 결과 표시
  if (answered === total && total > 0 && !state.revealedAll) {
    showResult(correct, total);
  }
}

function showResult(correct, total) {
  const percentage = Math.round((correct / total) * 100);
  let emoji = '🎉', comment = '잘했어요!';
  if (percentage === 100) { emoji = '🏆'; comment = '완벽! 시험장에서도 자신있게!'; }
  else if (percentage >= 80) { emoji = '🥇'; comment = '훌륭해요!'; }
  else if (percentage >= 60) { emoji = '🥈'; comment = '괜찮아요. 틀린 부분 한번 더 보세요.'; }
  else { emoji = '📚'; comment = '복습이 필요해요!'; }

  document.getElementById('resultCard').innerHTML = `
    <div class="result-emoji">${emoji}</div>
    <div class="result-score">${percentage}점</div>
    <div class="result-detail">${total}개 빈칸 중 <strong style="color:var(--success)">${correct}개</strong> 정답!<br><span style="color:var(--text2)">${comment}</span></div>
  `;
  document.getElementById('resultCard').classList.add('show');
  document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ========= 타이머 =========
function toggleTimer() {
  state.timerActive = !state.timerActive;
  const btn = document.getElementById('timerBtn');
  if (state.timerActive) {
    btn.classList.add('active');
    btn.textContent = '⏸ 타이머 정지';
    startTimer();
  } else {
    btn.classList.remove('active');
    btn.textContent = '⏱ 타이머 ON/OFF';
    stopTimer();
  }
}

function startTimer() {
  state.timeLeft = 60;
  updateTimerDisplay();
  state.timerInterval = setInterval(() => {
    state.timeLeft--;
    updateTimerDisplay();
    if (state.timeLeft <= 0) {
      stopTimer();
      alert('⏰ 1분 종료! 시험장 시간 감각 OK?');
      state.timerActive = false;
      document.getElementById('timerBtn').classList.remove('active');
      document.getElementById('timerBtn').textContent = '⏱ 타이머 ON/OFF';
    }
  }, 1000);
}

function stopTimer() {
  if (state.timerInterval) clearInterval(state.timerInterval);
  state.timerInterval = null;
}

function resetTimer() {
  stopTimer();
  state.timerActive = false;
  state.timeLeft = 60;
  document.getElementById('timerBtn').classList.remove('active');
  document.getElementById('timerBtn').textContent = '⏱ 타이머 ON/OFF';
  updateTimerDisplay();
}

function updateTimerDisplay() {
  const timer = document.getElementById('timer');
  const m = Math.floor(state.timeLeft / 60);
  const s = state.timeLeft % 60;
  timer.textContent = `⏱ ${m}:${s.toString().padStart(2, '0')}`;
  timer.classList.remove('warning', 'danger');
  if (state.timeLeft <= 10) timer.classList.add('danger');
  else if (state.timeLeft <= 30) timer.classList.add('warning');
}

// 시작
init();
</script>
