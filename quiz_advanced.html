
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📘 정보 기말고사 대비 퀴즈 (170문항)</title>
<style>
  :root{
    --bg:#fafbfc; --bg-card:#ffffff; --bg-soft:#f1f5f9;
    --text:#1e293b; --text-soft:#64748b; --text-faint:#94a3b8;
    --primary:#3b82f6; --primary-soft:#dbeafe; --primary-dark:#2563eb;
    --success:#10b981; --success-soft:#d1fae5;
    --danger:#ef4444; --danger-soft:#fee2e2;
    --warning:#f59e0b; --warning-soft:#fef3c7;
    --purple:#8b5cf6; --purple-soft:#ede9fe;
    --border:#e2e8f0; --shadow:0 2px 8px rgba(15,23,42,.06);
    --shadow-lg:0 8px 24px rgba(15,23,42,.10);
    --radius:14px;
  }
  [data-theme="dark"]{
    --bg:#0f172a; --bg-card:#1e293b; --bg-soft:#334155;
    --text:#f1f5f9; --text-soft:#cbd5e1; --text-faint:#94a3b8;
    --primary:#60a5fa; --primary-soft:#1e3a8a; --primary-dark:#3b82f6;
    --success:#34d399; --success-soft:#064e3b;
    --danger:#f87171; --danger-soft:#7f1d1d;
    --warning:#fbbf24; --warning-soft:#78350f;
    --purple:#a78bfa; --purple-soft:#4c1d95;
    --border:#334155; --shadow:0 2px 8px rgba(0,0,0,.3);
    --shadow-lg:0 8px 24px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Pretendard',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:var(--bg);color:var(--text);line-height:1.6;
    transition:background .3s,color .3s;
    padding:20px;min-height:100vh;
  }
  .container{max-width:900px;margin:0 auto}

  /* 헤더 */
  header{
    background:var(--bg-card);border-radius:var(--radius);padding:24px;
    box-shadow:var(--shadow);margin-bottom:20px;
    display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;
  }
  h1{font-size:24px;font-weight:800;color:var(--primary)}
  h1 .emoji{margin-right:8px}
  .subtitle{font-size:13px;color:var(--text-soft);margin-top:4px}
  .theme-toggle{
    background:var(--bg-soft);border:1px solid var(--border);border-radius:50px;
    padding:8px 16px;cursor:pointer;color:var(--text);font-size:14px;
    transition:all .2s;
  }
  .theme-toggle:hover{background:var(--primary-soft)}

  /* 컨트롤 패널 */
  .controls{
    background:var(--bg-card);border-radius:var(--radius);padding:20px;
    box-shadow:var(--shadow);margin-bottom:20px;
  }
  .filter-group{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .filter-label{
    font-size:13px;font-weight:600;color:var(--text-soft);
    width:100%;margin-bottom:4px;
  }
  .chip{
    background:var(--bg-soft);border:1px solid var(--border);
    padding:7px 14px;border-radius:50px;cursor:pointer;
    font-size:13px;color:var(--text);transition:all .2s;
    user-select:none;
  }
  .chip:hover{border-color:var(--primary)}
  .chip.active{background:var(--primary);color:white;border-color:var(--primary)}
  .action-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
  .btn{
    padding:10px 18px;border-radius:10px;border:none;cursor:pointer;
    font-size:14px;font-weight:600;transition:all .2s;
  }
  .btn-primary{background:var(--primary);color:white}
  .btn-primary:hover{background:var(--primary-dark)}
  .btn-secondary{background:var(--bg-soft);color:var(--text);border:1px solid var(--border)}
  .btn-secondary:hover{background:var(--primary-soft)}
  .btn-danger{background:var(--danger-soft);color:var(--danger)}
  .btn-danger:hover{filter:brightness(.95)}

  /* 진행도 */
  .progress-wrap{
    background:var(--bg-card);border-radius:var(--radius);padding:18px 20px;
    box-shadow:var(--shadow);margin-bottom:20px;
  }
  .progress-info{
    display:flex;justify-content:space-between;align-items:center;
    margin-bottom:10px;font-size:14px;
  }
  .progress-info .stat{color:var(--text-soft)}
  .progress-info .stat strong{color:var(--text);font-weight:700}
  .progress-bar{
    height:8px;background:var(--bg-soft);border-radius:50px;overflow:hidden;
  }
  .progress-fill{
    height:100%;background:linear-gradient(90deg,var(--primary),var(--purple));
    transition:width .4s;width:0;
  }

  /* 문제 카드 */
  .quiz-card{
    background:var(--bg-card);border-radius:var(--radius);padding:24px;
    box-shadow:var(--shadow);margin-bottom:16px;
    border-left:4px solid var(--primary);
    transition:all .3s;
  }
  .quiz-card.answered.correct{border-left-color:var(--success)}
  .quiz-card.answered.wrong{border-left-color:var(--danger)}

  .q-header{
    display:flex;justify-content:space-between;align-items:flex-start;
    margin-bottom:14px;flex-wrap:wrap;gap:8px;
  }
  .q-meta{display:flex;gap:6px;flex-wrap:wrap}
  .badge{
    padding:3px 10px;border-radius:50px;font-size:11px;font-weight:600;
  }
  .badge-unit{background:var(--primary-soft);color:var(--primary-dark)}
  .badge-type{background:var(--purple-soft);color:var(--purple)}
  .badge-num{background:var(--bg-soft);color:var(--text-soft)}
  .bookmark-btn{
    background:transparent;border:none;cursor:pointer;font-size:20px;
    color:var(--text-faint);transition:all .2s;
  }
  .bookmark-btn.active{color:var(--warning)}

  .q-text{
    font-size:16px;font-weight:600;line-height:1.7;
    margin-bottom:16px;color:var(--text);
  }
  .q-text code{
    background:var(--bg-soft);padding:2px 6px;border-radius:4px;
    font-family:'D2Coding','Consolas',monospace;font-size:14px;
  }
  .q-code{
    background:var(--bg-soft);padding:14px;border-radius:8px;
    font-family:'D2Coding','Consolas',monospace;font-size:13px;
    margin:12px 0;white-space:pre-wrap;overflow-x:auto;
    border-left:3px solid var(--purple);
  }

  .options{display:flex;flex-direction:column;gap:8px}
  .option{
    background:var(--bg-soft);padding:12px 16px;border-radius:10px;
    cursor:pointer;border:2px solid transparent;
    transition:all .2s;display:flex;align-items:flex-start;gap:10px;
  }
  .option:hover{border-color:var(--primary)}
  .option.selected{background:var(--primary-soft);border-color:var(--primary)}
  .option.correct{background:var(--success-soft);border-color:var(--success);color:var(--text)}
  .option.wrong{background:var(--danger-soft);border-color:var(--danger);color:var(--text)}
  .option.disabled{cursor:not-allowed}
  .option-num{
    background:var(--bg-card);border-radius:50%;
    width:24px;height:24px;display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:13px;flex-shrink:0;
  }
  .option.correct .option-num{background:var(--success);color:white}
  .option.wrong .option-num{background:var(--danger);color:white}
  .option-text{flex:1;font-size:14px}
  .option code{
    background:var(--bg-card);padding:1px 5px;border-radius:3px;
    font-family:'D2Coding','Consolas',monospace;font-size:13px;
  }

  /* 해설 */
  .explanation{
    margin-top:16px;padding:16px;background:var(--bg-soft);
    border-radius:10px;display:none;animation:slideDown .3s;
  }
  .explanation.show{display:block}
  @keyframes slideDown{
    from{opacity:0;transform:translateY(-8px)}
    to{opacity:1;transform:translateY(0)}
  }
  .exp-section{margin-bottom:12px}
  .exp-section:last-child{margin-bottom:0}
  .exp-title{
    font-size:13px;font-weight:700;margin-bottom:6px;
    display:flex;align-items:center;gap:6px;
  }
  .exp-correct .exp-title{color:var(--success)}
  .exp-confuse .exp-title{color:var(--warning)}
  .exp-tip .exp-title{color:var(--purple)}
  .exp-content{font-size:14px;line-height:1.7;color:var(--text-soft)}
  .exp-content code{
    background:var(--bg-card);padding:1px 5px;border-radius:3px;
    font-family:'D2Coding','Consolas',monospace;font-size:13px;
  }

  /* 결과 */
  .result-card{
    background:var(--bg-card);border-radius:var(--radius);padding:30px;
    box-shadow:var(--shadow-lg);text-align:center;display:none;
  }
  .result-card.show{display:block}
  .result-score{
    font-size:48px;font-weight:800;color:var(--primary);
    margin:16px 0;
  }
  .result-detail{color:var(--text-soft);margin-bottom:20px}
  .unit-stats{
    display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:10px;margin:20px 0;
  }
  .unit-stat{
    background:var(--bg-soft);padding:14px;border-radius:10px;
  }
  .unit-stat .name{font-size:12px;color:var(--text-soft);margin-bottom:4px}
  .unit-stat .score{font-size:18px;font-weight:700;color:var(--primary)}

  .empty{
    text-align:center;padding:40px;color:var(--text-soft);
    background:var(--bg-card);border-radius:var(--radius);
  }

  /* 모바일 대응 */
  @media (max-width:600px){
    body{padding:12px}
    h1{font-size:20px}
    .quiz-card{padding:18px}
    .q-text{font-size:15px}
  }
</style>
</head>
<body>
<div class="container">

<header>
  <div>
    <h1><span class="emoji">📘</span>정보 기말고사 대비 퀴즈</h1>
    <div class="subtitle">고1 정보 · 객관식 170문항 · 단원별/유형별 필터링 · 헷갈리는 선지 판단법 포함</div>
  </div>
  <button class="theme-toggle" id="themeToggle">🌙 다크모드</button>
</header>

<div class="controls">
  <div class="filter-group">
    <div class="filter-label">📚 단원 선택</div>
    <div class="chip active" data-unit="all">전체</div>
    <div class="chip" data-unit="1">1. 컴퓨팅 시스템</div>
    <div class="chip" data-unit="2">2. 데이터</div>
    <div class="chip" data-unit="3">3. 알고리즘과 프로그래밍</div>
    <div class="chip" data-unit="4">4. 인공지능</div>
    <div class="chip" data-unit="5">5. 정보 보호와 보안</div>
    <div class="chip" data-unit="6">🎁 코드 실행결과 (보너스)</div>
  </div>
  <div class="filter-group">
    <div class="filter-label">🎯 유형 선택</div>
    <div class="chip type-chip active" data-type="all">전체</div>
    <div class="chip type-chip" data-type="개념정의형">① 개념 정의형</div>
    <div class="chip type-chip" data-type="용어매칭형">② 용어 매칭형</div>
    <div class="chip type-chip" data-type="옳지않은것">③ 옳지 않은 것</div>
    <div class="chip type-chip" data-type="코드예측형">④ 코드 실행결과</div>
    <div class="chip type-chip" data-type="사례분류형">⑤ 사례 분류형</div>
  </div>
  <div class="filter-group">
    <div class="filter-label">⭐ 보기 옵션</div>
    <div class="chip" id="bookmarkFilter">⭐ 별표만 보기</div>
    <div class="chip" id="wrongFilter">❌ 틀린 문제만</div>
    <div class="chip" id="shuffleBtn">🔀 셔플</div>
  </div>
  <div class="action-row">
    <button class="btn btn-primary" id="submitBtn">📊 결과 확인</button>
    <button class="btn btn-secondary" id="resetBtn">🔄 처음부터</button>
  </div>
</div>

<div class="progress-wrap">
  <div class="progress-info">
    <span class="stat">진행: <strong id="progressText">0 / 0</strong></span>
    <span class="stat">정답: <strong id="correctText" style="color:var(--success)">0</strong> · 오답: <strong id="wrongText" style="color:var(--danger)">0</strong></span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
</div>

<div class="result-card" id="resultCard"></div>

<div id="quizContainer"></div>

</div>

<script>
// ============ 문제 데이터 (170문항) ============
// 단원: 1=컴퓨팅시스템, 2=데이터, 3=알고리즘프로그래밍, 4=인공지능, 5=정보보호, 6=코드보너스
// 유형: 개념정의형, 용어매칭형, 옳지않은것, 코드예측형, 사례분류형

const QUESTIONS = [
  // ============ 단원 1: 컴퓨팅 시스템 (30문항) ============
  {u:1,t:"개념정의형",q:"네트워크의 범위에 따른 분류 중, '수 m 정도의 아주 작은 영역에서 컴퓨터의 무선 키보드, 마우스, 블루투스, 에어드랍'이 속하는 네트워크는?",
   o:["LAN","PAN","MAN","WAN"],a:1,
   ec:"PAN(Personal Area Network)은 수 m 정도의 개인 영역 네트워크로, 블루투스·에어드랍·무선 키보드 등이 해당합니다.",
   ef:"LAN은 '교실/회사 건물 내부' 수준이라 더 큰 범위입니다. MAN은 도시 단위, WAN은 도시를 벗어난 광역망. 'PAN=Personal=개인 단위(수 m)' 라는 핵심 키워드를 기억하세요.",
   tip:"범위 순서: PAN(수m) < LAN(수m~수km, 건물내) < MAN(수km~수십km, 도시내) < WAN(도시 벗어남). 키워드: 블루투스/에어드랍 = PAN!"},

  {u:1,t:"용어매칭형",q:"학교 네트워크처럼 '유선과 무선이 혼합된 건물 내부 정도 규모'에 해당하는 네트워크 분류는?",
   o:["PAN","LAN","MAN","WAN"],a:1,
   ec:"LAN(Local Area Network)은 수 m~수 km 정도의 교실 또는 회사 건물 내부의 유선과 무선이 혼합된 네트워크입니다.",
   ef:"PAN은 개인 영역(수 m), MAN은 도시 단위(수십 km), WAN은 도시를 벗어난 광역. '학교/회사 건물 = LAN'으로 외워두세요.",
   tip:"문제에서 '건물 내부', '교실', '회사' 키워드가 나오면 무조건 LAN!"},

  {u:1,t:"개념정의형",q:"네트워크를 통해 데이터를 전송할 때, '전송하기 쉽도록 데이터를 적당한 크기로 자른 최소 전송 단위'를 무엇이라 하는가?",
   o:["프로토콜","패킷","라우터","IP 주소"],a:1,
   ec:"패킷(packet)은 네트워크를 통해 전송하기 쉽도록 데이터를 적당한 크기(예:1500byte)로 자른 최소 전송 단위입니다.",
   ef:"프로토콜은 통신 '규약'(약속), 라우터는 경로 결정 '장치', IP 주소는 컴퓨터의 '고유 주소'. 이 셋은 단위가 아닙니다.",
   tip:"'데이터를 잘게 나눈다' = 패킷! 각 패킷에는 '수신자 주소 + 데이터'가 들어있어 다른 경로로 전송될 수 있어요."},

  {u:1,t:"옳지않은것",q:"패킷 전송에 대한 설명으로 옳지 <b>않은</b> 것은?",
   o:["데이터는 패킷 단위로 작게 나뉘어 전송된다","각 패킷에는 수신자의 주소와 데이터가 담겨 있다","모든 패킷은 반드시 동일한 경로로 전송된다","수신자는 도착한 패킷들을 조합하여 데이터를 재구성한다"],a:2,
   ec:"패킷은 통신 매체의 용량 제한과 네트워크의 혼잡도에 따라 패킷마다 <b>다른 경로</b>로 전송됩니다.",
   ef:"'반드시', '항상', '모두'와 같은 절대 표현은 함정인 경우가 많습니다. 패킷은 같은 경로일 수도, 다른 경로일 수도 있어요.",
   tip:"시험 팁: '반드시/모두/항상' 같은 단어가 보이면 일단 의심해보고, 예외 상황을 떠올려보세요."},

  {u:1,t:"용어매칭형",q:"네트워크 장치 중 '경로를 결정하고 데이터 패킷이 목적지까지 갈 수 있는 길을 검사하여 가장 적절한 경로를 결정'하는 장치는?",
   o:["랜 카드","스위치","라우터","허브"],a:2,
   ec:"라우터(router)는 경로를 결정하고 스위칭하며, 데이터 패킷이 목적지까지 갈 수 있는 가장 적절한 길을 결정하는 장치입니다.",
   ef:"랜 카드는 '외부 네트워크와 제일 먼저 접속하는 장치', 스위치는 '소규모 네트워크에서 여러 기기를 연결'. 비슷해 보이지만 역할이 달라요.",
   tip:"라우터 = Route(길) 결정! '경로 결정' 키워드가 나오면 라우터!"},

  {u:1,t:"용어매칭형",q:"'외부 네트워크와 제일 먼저 접속하는 장치로, 컴퓨터 본체의 확장 슬롯에 꽂아 사용'하는 네트워크 장치는?",
   o:["라우터","스위치","랜 카드","CPU"],a:2,
   ec:"랜 카드는 외부 네트워크와 제일 먼저 접속하는 장치로, 컴퓨터 본체의 확장 슬롯에 꽂아 사용합니다.",
   ef:"라우터는 '경로 결정', 스위치는 '소규모 네트워크 내 여러 기기 연결', CPU는 '연산 장치'(네트워크 장치 아님)입니다.",
   tip:"랜 카드 = 컴퓨터 본체에 '꽂는 카드' / '확장 슬롯' 키워드가 나오면 랜 카드!"},

  {u:1,t:"옳지않은것",q:"네트워크 장치에 대한 설명으로 옳지 <b>않은</b> 것은?",
   o:["스위치는 소규모 네트워크 환경에서 여러 기기를 서로 연결한다","라우터는 경로를 결정하는 역할을 한다","랜 카드는 외부 네트워크와 제일 먼저 접속하는 장치이다","CPU는 외부 네트워크와의 통신을 담당하는 장치이다"],a:3,
   ec:"CPU(중앙 처리 장치)는 프로그램을 실행(연산)하고 각 장치를 제어하는 컴퓨팅 시스템의 두뇌 역할이며, 네트워크 통신을 담당하는 장치가 아닙니다.",
   ef:"네트워크 장치(랜 카드, 스위치, 라우터)와 컴퓨팅 시스템 구성요소(CPU, 기억장치, 입출력장치)를 구분해야 합니다.",
   tip:"CPU = 연산/제어 / 네트워크 통신 = 랜 카드, 스위치, 라우터. '두뇌 = CPU'는 네트워크와 무관!"},

  {u:1,t:"개념정의형",q:"'사물에 다양한 센서와 통신 기능을 장착하여 사물 간에 정보 교류가 가능하게 만든 것'으로, 각각의 사물이 제공하던 것 이상의 새로운 가치를 제공하는 기술은?",
   o:["사물 인터넷(IoT)","빅데이터","클라우드","인공지능"],a:0,
   ec:"사물 인터넷(IoT, Internet of Things)은 사물에 센서와 통신 기능을 장착하여 사물 간 정보 교류가 가능하게 만든 기술입니다.",
   ef:"빅데이터는 '대량의 데이터 분석', 클라우드는 '인터넷을 통한 자원 저장 환경', 인공지능은 '학습과 추론'. 사물 자체가 연결되는 게 IoT의 핵심!",
   tip:"IoT의 핵심 키워드: '사물에 센서/통신 기능 장착', '사물 간 정보 교류'. 예시: 하이패스, 스마트홈, 자율주행차"},

  {u:1,t:"개념정의형",q:"사물 인터넷 시스템의 동작 원리(DNPC) 중, '토양 수분 센서가 화분의 데이터를 측정하는 단계'에 해당하는 것은?",
   o:["데이터 수집(D)","네트워크를 통한 데이터 전달(N)","데이터 처리 및 분석(P)","서비스 제공(C)"],a:0,
   ec:"D(Data 수집) → N(Network 전달) → P(Process 처리) → C(서viCe 제공) 순서이며, 센서가 측정하는 단계가 데이터 수집입니다.",
   ef:"'전송'은 N, '판단/분석'은 P, '사용자에게 알림'은 C. 헷갈리면 '센서 측정'은 무조건 D로 기억!",
   tip:"DNPC 외우기: 'D(센서) → N(전송) → P(분석) → C(서비스)' 4단계 순서!"},

  {u:1,t:"사례분류형",q:"하이패스 통행료 지불 시스템에서 '결제 완료 정보를 차량 단말기 카드에 기록한다'는 단계는 사물 인터넷 동작 원리 중 어디에 해당하는가?",
   o:["데이터 수집","데이터 전달","데이터 처리 및 분석","서비스 제공"],a:3,
   ec:"카드 결제 완료 정보를 단말기에 기록하는 것은 사용자에게 최종 서비스를 제공하는 단계로, '서비스 제공(C)'에 해당합니다.",
   ef:"'결제 정보 전송' 부분만 보면 N(전달)으로 헷갈리지만, 최종적으로 사용자에게 결과(서비스)를 제공하는 마지막 단계라는 점을 봐야 해요.",
   tip:"DNPC 마지막 단계 = '사용자가 체감하는 결과 제공'. '기록', '알림', '작동'이라는 단어가 나오면 C!"},

  {u:1,t:"개념정의형",q:"개인 컴퓨터에서 다른 네트워크를 방문할 때 거치는 통신 중계기는?",
   o:["랜 카드","스위치","라우터","DNS 서버"],a:2,
   ec:"라우터는 다른 네트워크로 가는 길을 알려주는 통신 중계기 역할을 합니다.",
   ef:"DNS 서버는 '도메인 이름→IP 주소 변환' 역할이지 중계기가 아닙니다. 스위치는 '같은 네트워크 내부' 연결.",
   tip:"'다른 네트워크로 가는 중계기' = 라우터! '길 안내' 역할로 기억하세요."},

  {u:1,t:"옳지않은것",q:"사물 인터넷(IoT)에 대한 설명으로 옳지 <b>않은</b> 것은?",
   o:["사물에 센서와 통신 기능을 장착한다","사람이 직접 명령을 내려야만 사물이 작동한다","자동차, 가전제품, 옷, 신발도 사물 인터넷의 사물이 될 수 있다","스마트홈 서비스, 자율주행 자동차가 대표적 사례이다"],a:1,
   ec:"인터넷에 연결된 사물들은 사람이 직접 명령을 내리지 않아도 서로 정보를 주고받으며 스스로 작동할 수 있습니다.",
   ef:"'반드시 사람이 명령'은 IoT의 핵심 가치를 부정하는 함정 선지! IoT는 '자율적 작동'이 핵심입니다.",
   tip:"IoT 핵심: '사람 명령 없이도 자동 작동'. '반드시 사람이 ~해야 한다'는 거의 오답!"},

  {u:1,t:"용어매칭형",q:"'센서, 액추에이터, 통신 모듈과 이것을 제어하는 마이크로컨트롤러 등이 포함된 장치'를 가리키는 사물 인터넷 시스템 구성 요소는?",
   o:["플랫폼(P)","네트워크(N)","디바이스(D)","서비스(S)"],a:2,
   ec:"디바이스(D)는 센서, 액추에이터, 통신 모듈, 마이크로컨트롤러 등이 포함된 실제 하드웨어 장치입니다.",
   ef:"플랫폼은 '중계자(서비스 연결)', 네트워크는 '통신 경로'. 헷갈리면 '센서가 들어있는 물리 장치 = 디바이스'!",
   tip:"디바이스 = 'D'evice = 실제 '장치'. 플랫폼 = '중계 서비스'."},

  {u:1,t:"용어매칭형",q:"'특정 서비스에 종속되지 않고 다양한 사물 인터넷 서비스를 제공하기 위해 다수의 사용자와 다양한 사물들 사이의 중계자 역할을 하는' 사물 인터넷 구성 요소는?",
   o:["플랫폼(P)","네트워크(N)","디바이스(D)","센서(S)"],a:0,
   ec:"플랫폼(P)은 사용자와 사물 사이에서 중계자 역할을 하며, 다양한 IoT 서비스를 제공합니다.",
   ef:"네트워크는 '데이터 통로', 디바이스는 '하드웨어 장치'. '중계자' 키워드가 나오면 플랫폼!",
   tip:"플랫폼 = '중간 다리' 역할. '서비스 중계', '연결' 키워드가 나오면 P!"},

  {u:1,t:"용어매칭형",q:"'사물과 사물, 디바이스와 플랫폼을 연결하는' 사물 인터넷 구성 요소는?",
   o:["디바이스(D)","네트워크(N)","플랫폼(P)","서비스(S)"],a:1,
   ec:"네트워크(N)는 사물과 사물, 디바이스와 플랫폼을 연결하는 역할을 합니다.",
   ef:"디바이스는 '센서가 들어있는 장치 자체', 플랫폼은 '서비스 중계'. 단순히 '연결'이라는 단어가 나오면 N!",
   tip:"네트워크 = 연결 통로. '연결한다' 단어가 핵심이면 N!"},

  {u:1,t:"개념정의형",q:"컴퓨팅 시스템 간에 네트워크로 연결할 때 컴퓨터 고유의 주소는?",
   o:["DNS 서버","IP 주소","MAC 주소","라우터 주소"],a:1,
   ec:"IP 주소는 컴퓨팅 시스템 간 네트워크 연결 시 컴퓨터의 고유 주소입니다.",
   ef:"DNS 서버는 '도메인을 IP로 변환해주는 서버'이지 주소가 아닙니다. 둘이 헷갈릴 수 있어요!",
   tip:"IP 주소 = 컴퓨터 고유의 '주민등록번호' / DNS = 이름→번호 변환 '전화번호부'"},

  {u:1,t:"사례분류형",q:"다음 중 사물 인터넷, 빅데이터 등을 활용해 '최적의 생육 환경을 자동으로 제어하는 지능화된 농장'을 가리키는 용어는?",
   o:["스마트 시티","스마트 팜","스마트 그리드","스마트 홈"],a:1,
   ec:"스마트 팜은 사물 인터넷, 빅데이터를 활용해 작물의 생육 환경을 자동 제어하는 지능화된 농장입니다.",
   ef:"스마트 시티는 '도시 전체', 스마트 홈은 '집', 스마트 그리드는 '전력망'. '농장' 키워드는 스마트 팜!",
   tip:"'생육', '농장', '작물' 키워드 = 스마트 팜!"},

  {u:1,t:"사례분류형",q:"'도시 전체가 네트워크로 연결되어 곳곳에 설치된 센서의 정보를 실시간으로 받아 발생하는 문제를 해결하여 지속 가능한 도시를 만들어 주는 시스템'은?",
   o:["스마트 팜","스마트 홈","스마트 시티","스마트 카"],a:2,
   ec:"스마트 시티는 도시 전체가 네트워크로 연결되어 실시간 데이터로 도시 문제를 해결하는 시스템입니다.",
   ef:"'도시 전체'라는 핵심 키워드를 놓치지 마세요. 농장은 스마트 팜, 집은 스마트 홈으로 명확히 구분!",
   tip:"규모로 외우기: 홈(집) < 팜(농장) < 시티(도시)"},

  {u:1,t:"사례분류형",q:"다음 중 사람의 움직임을 감지하는 센서는?",
   o:["조도 센서","온도 센서","인체 감지 센서","습도 센서"],a:2,
   ec:"인체 감지 센서는 사람의 움직임을 감지하는 센서입니다.",
   ef:"조도 센서는 '빛의 밝기' 감지(움직임이 아님!), 온도 센서는 '온도', 습도 센서는 '습도'. 자동문 = 인체 감지 센서!",
   tip:"센서별 감지 대상: 조도=빛, 온도=온도, 습도=습도, 인체=사람 움직임"},

  {u:1,t:"개념정의형",q:"네트워크에서 클라우드(cloud)에 대한 설명으로 가장 적절한 것은?",
   o:["근거리 무선 통신을 위한 장치","인터넷을 통해 접근할 수 있는 서버에 데이터, 소프트웨어 등의 자원을 저장하여 사용하는 환경","사물 인터넷의 센서 종류 중 하나","유선 케이블의 일종"],a:1,
   ec:"클라우드는 인터넷을 통해 접근할 수 있는 서버에 데이터·소프트웨어 등의 자원을 저장하여 언제 어디서든 이용할 수 있는 환경입니다.",
   ef:"'근거리 무선'은 블루투스/NFC, '센서'나 '케이블'은 IoT 하드웨어. 클라우드는 '인터넷 기반 가상 저장 환경'!",
   tip:"클라우드 = '구름' 처럼 어디서나 접근 가능한 인터넷 저장공간"},

  {u:1,t:"용어매칭형",q:"유선 통신 매체의 종류에 해당하는 것은?",
   o:["블루투스","와이파이","UTP 케이블","NFC"],a:2,
   ec:"UTP 케이블, 광섬유 케이블이 유선 매체의 종류입니다.",
   ef:"블루투스, 와이파이, NFC, RFID는 모두 무선 매체! 유선/무선 구분을 정확히 해야 해요.",
   tip:"유선 매체: UTP 케이블, 광섬유 케이블 / 무선 매체: 블루투스, 와이파이, NFC, RFID"},

  {u:1,t:"용어매칭형",q:"무선 매체의 종류로 묶인 것은?",
   o:["UTP 케이블, 광섬유 케이블","블루투스, 와이파이, NFC, RFID","랜 카드, 라우터, 스위치","CPU, 메모리, 입출력장치"],a:1,
   ec:"무선 매체에는 블루투스, 와이파이, NFC, RFID가 있습니다.",
   ef:"UTP/광섬유는 유선, 랜카드/라우터/스위치는 '장치'(매체 아님), CPU 등은 컴퓨팅 시스템 구성요소.",
   tip:"매체 = 데이터가 흐르는 '길' / 장치 = 길에 놓인 '교통 시스템'"},

  {u:1,t:"개념정의형",q:"라우팅 기능 없이 무선 공유만 하고 싶을 때 유선을 무선으로 전환해 주는 장치는?",
   o:["라우터","AP(Access Point)","스위치","랜 카드"],a:1,
   ec:"AP(Access Point)는 라우팅 기능 없이 유선을 무선으로 전환해주는 장치입니다.",
   ef:"라우터는 '경로 결정'까지 하는 장치. AP는 단순히 무선 신호로 변환만 합니다. 둘이 비슷해 보여도 기능이 달라요!",
   tip:"라우터 = 경로 결정 + 무선 공유 / AP = 무선 공유만 (경로결정 X)"},

  {u:1,t:"개념정의형",q:"하이패스 시스템에서 '하이패스 단말기를 설치한 자동차가 톨게이트를 지나면 차량을 인식하여 차량 단말기에 결제 정보를 전송한다'는 단계의 IoT 동작 원리는?",
   o:["데이터 수집","데이터 전달","데이터 처리 및 분석","서비스 제공"],a:0,
   ec:"차량을 인식하여 결제 정보를 요청하는 '인식' 단계는 데이터 수집(D)에 해당합니다.",
   ef:"'전송한다'는 표현 때문에 N으로 헷갈리기 쉽지만, 최초의 '인식/측정' 행위가 핵심이므로 D입니다.",
   tip:"'차량 인식', '센서 감지', '측정' = 무조건 D(수집)!"},

  {u:1,t:"사례분류형",q:"'스마트 화분의 토양 수분 센서가 측정한 데이터를 클라우드 플랫폼으로 전송한다'는 사물 인터넷 동작 단계는?",
   o:["데이터 수집(D)","데이터 전달(N)","데이터 처리 및 분석(P)","서비스 제공(C)"],a:1,
   ec:"센서로 측정한 데이터를 네트워크를 통해 클라우드로 보내는 단계는 데이터 전달(N)입니다.",
   ef:"'측정'은 D, '전송/전달'은 N, '판단/분석'은 P. 동사를 정확히 보세요!",
   tip:"동사 매칭: 측정/감지=D, 전송/전달=N, 분석/판단=P, 알림/작동=C"},

  {u:1,t:"옳지않은것",q:"네트워크 범위 분류에 대한 설명으로 옳지 <b>않은</b> 것은?",
   o:["PAN은 수 m 정도의 개인 영역 네트워크이다","LAN은 교실 또는 회사 건물 내부의 네트워크이다","MAN은 도시를 벗어난 광역 네트워크이다","WAN은 도시를 벗어난 범위의 네트워크이다"],a:2,
   ec:"MAN(Metropolitan Area Network)은 수 km~수십 km의 '도시 내' 네트워크입니다. '도시를 벗어난'은 WAN의 설명입니다.",
   ef:"MAN과 WAN을 일부러 바꿔 헷갈리게 출제! Metro=도시, Wide=광역으로 외우세요.",
   tip:"M(etro)AN = 도시 내 / W(ide)AN = 도시 벗어남(광역)"},

  {u:1,t:"개념정의형",q:"파일을 학급 친구에게 공유하기 위해 '인터넷을 통해 접근할 수 있는 서버에 데이터를 저장하여 사용자가 언제 어디서든 이용할 수 있는 환경'을 활용한다. 이 환경은?",
   o:["블루투스","클라우드","랜 카드","DNS"],a:1,
   ec:"클라우드는 언제 어디서나 인터넷을 통해 데이터를 저장·공유할 수 있는 환경입니다.",
   ef:"블루투스는 '근거리 무선 1:1 연결'이라 한계가 있고, 랜카드/DNS는 공유 환경이 아닙니다.",
   tip:"'언제 어디서든 접근' = 클라우드의 핵심 특징"},

  {u:1,t:"사례분류형",q:"다음 중 사물 인터넷의 '서비스 제공(C)' 단계 사례로 가장 적절한 것은?",
   o:["토양 수분 센서가 화분의 수분을 측정한다","센서가 측정한 값을 클라우드로 전송한다","수분 부족 여부를 판단한다","스마트 기기에 '물 주기' 알림을 띄워준다"],a:3,
   ec:"사용자에게 알림이나 결과를 제공하는 단계가 C(서비스 제공)입니다.",
   ef:"'측정' D, '전송' N, '판단' P, '알림/제공' C. 사용자 입장에서 체감되는 결과가 C!",
   tip:"사용자가 보거나 체감 = 서비스 제공(C)!"},

  {u:1,t:"개념정의형",q:"네트워크 통신에서 '서로 다른 시스템 간의 약속(규약)'을 의미하는 용어는?",
   o:["프로토콜","패킷","라우터","DNS"],a:0,
   ec:"프로토콜은 컴퓨터 간 통신을 위한 약속(규약)입니다.",
   ef:"패킷은 '데이터의 작은 단위', 라우터는 '경로 결정 장치', DNS는 '도메인-IP 변환 서버'. 약속/규약 = 프로토콜!",
   tip:"프로토콜 = 'Protocol' = 외교에서의 '의전/규약'에서 유래. '약속'!"},

  {u:1,t:"옳지않은것",q:"다음 중 IP 주소와 DNS 서버에 대한 설명으로 옳지 <b>않은</b> 것은?",
   o:["IP 주소는 컴퓨터의 고유 주소이다","DNS 서버는 도메인 이름을 IP 주소로 변환해준다","IP 주소와 DNS 서버는 같은 의미이다","IP 주소는 네트워크 통신 시 필요하다"],a:2,
   ec:"IP 주소는 '컴퓨터 고유 주소', DNS 서버는 '도메인을 IP로 변환해주는 서버'로 서로 다른 개념입니다.",
   ef:"둘이 헷갈리기 매우 쉬운 함정 문항! 같다고 표현하면 무조건 오답!",
   tip:"IP = 주민번호 / DNS = 이름↔주민번호 변환 시스템"},

  // ============ 단원 2: 데이터 (30문항) ============
  {u:2,t:"개념정의형",q:"디지털 데이터 압축에 대한 설명으로 가장 적절한 것은?",
   o:["원본 데이터를 더 큰 용량의 데이터로 만드는 것","원본 데이터를 더 작은 용량의 데이터로 만드는 것","데이터를 모두 삭제하는 것","데이터를 다른 형식으로 변환하는 것"],a:1,
   ec:"데이터 압축은 원본 데이터를 더 작은 용량의 데이터로 만드는 작업입니다.",
   ef:"'더 크게 만든다'는 압축의 정반대! '삭제'나 단순 '변환'도 압축이 아니에요.",
   tip:"압축 = 작게 만드는 것! 부피를 줄이는 일상적 의미와 동일."},

  {u:2,t:"용어매칭형",q:"'데이터 손실 없이 압축을 하기 때문에 압축률이 낮아 용량이 큰 편'인 압축 방식은?",
   o:["손실 압축","무손실 압축","RLE 압축","JPEG 압축"],a:1,
   ec:"무손실 압축은 데이터 손실 없이 압축하므로 압축률이 낮고 용량이 큰 편입니다. 원본과 거의 같게 복원 가능합니다.",
   ef:"손실 압축은 '손실이 있지만 압축률 높음'으로 정반대! JPEG는 손실 압축의 한 형식.",
   tip:"무손실 = 손실 X = 원본 그대로 (압축률 낮음) / 손실 = 손실 O = 원본과 다를 수 있음 (압축률 높음)"},

  {u:2,t:"옳지않은것",q:"무손실 압축에 대한 설명으로 옳지 <b>않은</b> 것은?",
   o:["데이터 손실이 없다","원본과 거의 같게 복원할 수 있다","압축률이 높아 용량이 매우 작다","ZIP, GIF, PNG 등이 대표적이다"],a:2,
   ec:"무손실 압축은 압축률이 <b>낮아</b> 용량이 큰 편입니다. 압축률이 높은 것은 손실 압축입니다.",
   ef:"'압축률 높음'을 무손실에 붙인 함정! 무손실=낮은 압축률, 손실=높은 압축률.",
   tip:"공식처럼 외우기: 무손실 = 손실X, 압축률↓, 용량↑ / 손실 = 손실O, 압축률↑, 용량↓"},

  {u:2,t:"용어매칭형",q:"'JPEG, MPEG, MP3' 파일 형식이 사용하는 압축 방법은?",
   o:["무손실 압축","손실 압축","런 길이 부호화","BMP 압축"],a:1,
   ec:"JPEG, MPEG, MP3는 손실 압축의 대표적 파일 형식입니다.",
   ef:"무손실 압축의 대표 형식은 ZIP, GIF, PNG. 자주 헷갈리는 GIF/PNG vs JPEG 구분!",
   tip:"무손실: ZIP, GIF, PNG / 손실: JPEG, MPEG, MP3 (이미지·영상·음원에서 압축률 높음 필요)"},

  {u:2,t:"개념정의형",q:"'동일한 데이터가 몇 번 반복되는지 기록하여 데이터를 짧게 만드는 방식'의 무손실 압축 기법은?",
   o:["허프만 부호화","런 길이 부호화(RLE)","DCT 변환","사전식 압축"],a:1,
   ec:"런 길이 부호화(Run Length Encoding)는 동일 데이터의 반복 횟수를 기록하는 무손실 압축 방식입니다.",
   ef:"'반복 횟수 기록' 키워드는 RLE의 핵심! BMP가 RLE를 사용하는 대표 이미지 파일.",
   tip:"Run Length = '연속 길이' 부호화. 'AAAA' → 'A4'처럼 압축!"},

  {u:2,t:"코드예측형",q:"문자열 'HAAAAAAPPY'를 런 길이 부호화 방식으로 압축한 결과는?",
   o:["H1A6P2Y1","HAAAAAAPPY","H6A2P1Y","HAPY"],a:0,
   ec:"각 문자가 연속으로 몇 번 나오는지 세어 '문자+숫자' 형태로 표현합니다. H가 1번, A가 6번, P가 2번, Y가 1번 → H1A6P2Y1.",
   ef:"단순히 글자만 나열하거나, 숫자 순서가 바뀐 선지에 주의! '문자→숫자' 순서를 정확히 기억하세요.",
   tip:"RLE 압축법: 연속된 문자를 세어 '문자+개수' 순으로! AAAAA → A5"},

  {u:2,t:"옳지않은것",q:"손실 압축에 대한 설명으로 옳지 <b>않은</b> 것은?",
   o:["원본과 차이가 있을 수 있다","압축률이 높아 용량을 효과적으로 줄일 수 있다","JPEG, MP3 등이 사용한다","텍스트 파일이나 은행 기록 데이터에 적합하다"],a:3,
   ec:"텍스트 파일이나 은행 기록처럼 손실이 생기면 안 되는 데이터에는 <b>무손실 압축</b>이 적합합니다.",
   ef:"손실 압축에 적합한 데이터(이미지/영상/음원)와 무손실에 적합한 데이터(텍스트/기록)를 헷갈리게 한 함정!",
   tip:"손실 OK = 사람이 못 알아챔(이미지/영상/음원) / 손실 NO = 1글자만 틀려도 큰일(텍스트/은행)"},

  {u:2,t:"개념정의형",q:"'변환하기 전의 데이터와 변환 후의 데이터의 크기 비율로서, 값이 높을수록 압축이 더 잘되었음을 의미'하는 것은?",
   o:["압축률","해상도","용량비","효율도"],a:0,
   ec:"압축률은 변환 전후 데이터 크기 비율로, 높을수록 압축이 잘된 것입니다.",
   ef:"해상도는 '이미지 화질'과 관련, 용량비/효율도는 정확한 용어가 아님!",
   tip:"압축률 ↑ = 압축 잘됨 = 작아짐"},

  {u:2,t:"코드예측형",q:"원본 데이터 'NOOOOOOOOOO' (11bytes)를 런 길이 부호화로 압축하면 'N1O10' (5bytes)가 된다. 이때의 압축률은? (압축률 = 원본/압축후)",
   o:["1.1","2.2","5.0","11.0"],a:1,
   ec:"PDF 표에서 11bytes → 5bytes로 압축되었을 때 압축률은 2.2로 명시됩니다(11/5=2.2).",
   ef:"단순히 차이를 빼는 게 아니라 '비율'로 계산해야 해요. 11-5=6 같은 함정 선지에 주의!",
   tip:"압축률 = 원본 크기 ÷ 압축 후 크기 (값이 클수록 잘 압축됨)"},

  {u:2,t:"사례분류형",q:"다음 중 무손실 압축이 가장 적합한 데이터는?",
   o:["고화질 영화 영상","온라인 음악 스트리밍","은행 거래 기록 텍스트 파일","SNS에 올리는 사진"],a:2,
   ec:"은행 거래 기록처럼 1글자라도 손실되면 안 되는 데이터는 무손실 압축이 적합합니다.",
   ef:"영상/음악/사진은 약간의 손실이 인간의 눈/귀에 잘 안 보여서 손실 압축이 효율적!",
   tip:"무손실 적합: 텍스트, 기록, 코드(손실 시 의미 변함) / 손실 적합: 이미지, 영상, 음원"},

  {u:2,t:"개념정의형",q:"'미리 정해 놓은 정해진 형태의 데이터로, 행과 열로 표현하는 테이블 등의 형태로 저장할 수 있는 데이터'를 가리키는 용어는?",
   o:["정형 데이터","비정형 데이터","반정형 데이터","메타 데이터"],a:0,
   ec:"정형 데이터는 미리 정해진 형식(행과 열, 테이블)으로 저장되는 데이터로, 날짜·이름·주소 등이 대표적입니다.",
   ef:"비정형은 '형식이 정해지지 않은' 데이터(문자, 소리, 이미지, 동영상). 정형/비정형은 정확히 반대 개념!",
   tip:"정형 = 표(엑셀 형태)로 가능 / 비정형 = 표로 표현 어려움(이미지·소리)"},

  {u:2,t:"용어매칭형",q:"'문자, 소리, 이미지, 동영상' 등이 대표적인 데이터의 종류는?",
   o:["정형 데이터","비정형 데이터","구조 데이터","메타 데이터"],a:1,
   ec:"비정형 데이터는 형식이 정해지지 않은 데이터로, 문자·소리·이미지·동영상 등이 대표적입니다.",
   ef:"날짜·이름·주소(표 가능)는 정형 데이터! 미디어 파일은 비정형!",
   tip:"미디어(이미지/소리/동영상) = 무조건 비정형!"},

  {u:2,t:"옳지않은것",q:"데이터 압축의 필요성으로 옳지 <b>않은</b> 것은?",
   o:["저장 공간을 줄일 수 있다","전송 시간을 줄일 수 있다","데이터 관리 비용을 낮출 수 있다","원본 데이터의 화질을 항상 향상시킨다"],a:3,
   ec:"압축은 화질 향상이 아니라 용량 축소가 목적입니다. 손실 압축은 오히려 화질이 떨어질 수 있어요.",
   ef:"'화질 향상'은 압축의 목적이 아닙니다! 압축의 핵심: 저장공간↓, 전송시간↓, 비용↓",
   tip:"압축 = 작게! 화질 향상은 다른 기술(업스케일링 등)의 영역"},

  {u:2,t:"개념정의형",q:"환경적인 측면에서 데이터 압축이 가져다주는 이점은?",
   o:["데이터 처리 속도 감소","데이터 센터의 전기 사용 감소로 탄소 배출 감소","원본 데이터 손실 보장","데이터 해독 비용 감소"],a:1,
   ec:"데이터 압축으로 저장·전송에 필요한 전기 사용이 줄어 환경적 이점(탄소 배출 감소)이 있습니다.",
   ef:"'처리 속도 감소'는 부정적 표현이라 함정! '원본 손실 보장'도 무손실 압축의 의도와 맞지 않음.",
   tip:"압축의 환경 이점 = 전기↓ → 탄소↓ → 친환경"},

  {u:2,t:"옳지않은것",q:"런 길이 부호화에 대한 설명으로 옳지 <b>않은</b> 것은?",
   o:["연속적인 반복이 많은 데이터에 효율적이다","BMP 같은 이미지 파일 형식에 사용된다","무손실 압축 방식의 일종이다","연속 반복이 적은 데이터일수록 압축률이 높다"],a:3,
   ec:"RLE는 '연속 반복'을 압축하는 방식이라, 반복이 적으면 오히려 압축이 잘 되지 않거나 데이터가 더 커질 수도 있습니다.",
   ef:"'반복이 적을수록' 압축이 잘 된다는 건 RLE 원리에 정반대! 핵심 원리를 이해해야 풀 수 있는 함정!",
   tip:"RLE는 '반복 의존' 압축. 반복 多 = 효율 ↑ / 반복 少 = 효율 ↓"},

  {u:2,t:"용어매칭형",q:"손실 압축의 대표적인 파일 형식이 <b>아닌</b> 것은?",
   o:["JPEG","MP3","MPEG","PNG"],a:3,
   ec:"PNG는 무손실 압축의 대표적 형식입니다. JPEG, MP3, MPEG는 손실 압축.",
   ef:"이미지 형식이라고 다 손실 압축은 아님! PNG와 GIF는 무손실, JPEG는 손실.",
   tip:"이미지 형식: PNG/GIF=무손실, JPEG=손실 / 음원·영상: MP3/MPEG=손실"},

  {u:2,t:"코드예측형",q:"문자열 'YEEEEEAH'(8bytes)를 런 길이 부호화로 압축하면?",
   o:["Y1E5A1H1","YE5AH","Y5E1A1H","YEEEEEAH"],a:0,
   ec:"Y가 1번, E가 5번, A가 1번, H가 1번 → 'Y1E5A1H1'.",
   ef:"개수가 1인 문자도 표시해야 합니다! 'YE5AH'처럼 1을 생략한 표기는 정확한 RLE가 아님.",
   tip:"RLE는 모든 문자에 개수를 붙여요. 1번이라도 'A1'!"},

  {u:2,t:"개념정의형",q:"디지털 데이터에 대한 설명으로 가장 적절한 것은?",
   o:["연속적인 신호 형태로 저장된 정보","컴퓨터가 0과 1의 숫자로 변환하여 저장한 정보","아날로그 형태로 저장된 정보","사람만 읽을 수 있는 형태의 정보"],a:1,
   ec:"디지털 데이터는 정보를 0과 1의 숫자(이진수) 형태로 변환하여 저장한 데이터입니다.",
   ef:"'연속적인 신호'는 아날로그! 디지털은 '0과 1의 이산적' 형태.",
   tip:"디지털 = Digit(숫자) = 0과 1로 표현"},

  {u:2,t:"사례분류형",q:"다음 데이터 중 정형 데이터로 분류되는 것은?",
   o:["고양이 사진","녹음된 음악 파일","엑셀로 정리한 학생 명단(이름, 학번, 점수)","유튜브 영상"],a:2,
   ec:"엑셀처럼 행과 열로 표현 가능한 학생 명단은 정형 데이터입니다.",
   ef:"이미지/음원/영상은 모두 비정형! '표로 정리 가능한지'가 판단 기준.",
   tip:"표(엑셀)로 깔끔히 정리되면 정형!"},

  {u:2,t:"옳지않은것",q:"무손실 압축과 손실 압축의 비교로 옳지 <b>않은</b> 것은?",
   o:["무손실 압축은 원본과 거의 같음","손실 압축은 원본과 다를 수 있음","무손실 압축은 압축률이 손실 압축보다 높음","손실 압축은 용량이 작은 편"],a:2,
   ec:"무손실 압축은 압축률이 <b>낮습니다</b>. 손실 압축이 압축률이 높습니다.",
   ef:"'무손실=낮은 압축률, 손실=높은 압축률' 이 표가 자주 헷갈리니 표를 통째로 외우세요!",
   tip:"표 외우기: 무손실(손실X, 거의같음, 압축률↓, 용량↑) / 손실(손실O, 다를수있음, 압축률↑, 용량↓)"},

  {u:2,t:"개념정의형",q:"'대규모 데이터셋을 압축하면 분석 결과를 더 빠르게 얻을 수 있고 데이터 관리 비용도 줄일 수 있다'는 사례가 가장 적합한 분야는?",
   o:["의료 분야의 의료 이미지·환자 기록 관리","음악 감상","게임 개발","웹 디자인"],a:0,
   ec:"의료 분야에서는 대규모 의료 이미지와 환자 기록을 효과적으로 관리·공유하기 위해 데이터 압축을 활용합니다.",
   ef:"PDF에서 직접 언급된 사례를 묻는 문제. 다른 선지도 압축을 사용하긴 하지만 PDF의 핵심 사례는 의료!",
   tip:"교과서 사례 키워드: '의료', '환자 기록', '대규모 데이터셋'"},

  {u:2,t:"개념정의형",q:"디지털 데이터 압축의 원리에 대한 설명으로 무손실 압축에 해당하는 것은?",
   o:["사람이 인지하기 어려운 데이터를 제거한다","0과 1의 나열 순서를 기억하여 원본과 똑같이 적는다","저주파 신호만 남기고 나머지는 버린다","이미지의 일부 픽셀을 평균값으로 치환한다"],a:1,
   ec:"무손실 압축은 0과 1의 나열 순서를 기억해뒀다가 원본과 똑같이 복원하는 방식입니다.",
   ef:"나머지 선지(데이터 제거, 신호 버림, 픽셀 평균)는 모두 손실 압축의 원리입니다.",
   tip:"무손실 = '순서 기록' 방식 / 손실 = '필요없는 부분 제거' 방식"},

  {u:2,t:"사례분류형",q:"다음 사례 중 손실 압축이 가장 적절하지 <b>않은</b> 경우는?",
   o:["스트리밍 서비스의 영화 영상","SNS에 업로드하는 인증샷","온라인 음악 스트리밍","법원에 제출할 계약서 PDF"],a:3,
   ec:"법원 제출용 계약서는 1글자라도 손실되면 안 되는 중요 문서이므로 무손실 압축이 적합합니다.",
   ef:"문맥상 '법적 효력'이 있는 데이터는 손실 압축 절대 불가!",
   tip:"법적/금전적/계약 관련 데이터 = 무손실!"},

  {u:2,t:"옳지않은것",q:"데이터 압축에 관한 설명으로 옳지 <b>않은</b> 것은?",
   o:["압축은 저장 공간과 전송 시간을 줄이는 데 효과적이다","무손실 압축의 대표 형식은 ZIP, PNG, GIF이다","압축률이 높을수록 데이터가 더 잘 압축된 것이다","손실 압축은 모든 종류의 데이터에 적합하다"],a:3,
   ec:"손실 압축은 '모든 종류'의 데이터에 적합하지 않습니다. 텍스트나 기록처럼 손실되면 안 되는 데이터에는 부적합합니다.",
   ef:"'모든', '항상', '반드시' 같은 절대 표현은 함정! 데이터 종류에 따라 적합성이 다릅니다.",
   tip:"'모든 데이터에 적합' = 거의 오답! 압축은 데이터 특성에 맞게 선택해야 함."},

  {u:2,t:"코드예측형",q:"원본 데이터 'HURRAY'(6bytes)에 RLE를 적용한 결과의 크기는? (각 문자+숫자가 1byte씩 차지한다고 가정)",
   o:["6bytes","8bytes","10bytes","12bytes"],a:2,
   ec:"H1U1R2A1Y1로 압축됩니다. H,1,U,1,R,2,A,1,Y,1 → 10bytes로, 원본보다 오히려 큽니다(반복이 적기 때문).",
   ef:"RLE는 반복이 적으면 압축률이 매우 낮아 오히려 데이터가 커질 수 있다는 한계를 보여주는 문제!",
   tip:"RLE 한계: 반복 적으면 압축이 안 되거나 더 커짐. 시험에 자주 출제!"},

  {u:2,t:"개념정의형",q:"데이터 압축의 한 종류인 RLE의 한계점으로 가장 적절한 것은?",
   o:["압축 속도가 매우 느리다","연속 반복이 적은 데이터에서는 효율이 낮거나 오히려 용량이 증가할 수 있다","파일 손상 위험이 크다","JPEG에만 적용 가능하다"],a:1,
   ec:"RLE는 연속 반복을 활용하므로, 반복이 적은 데이터에서는 효율이 떨어지거나 오히려 용량이 늘어날 수 있습니다.",
   ef:"속도/손상 위험은 RLE 한계와 무관. 'JPEG에만'은 잘못된 정보(JPEG는 손실 압축).",
   tip:"RLE 한계 = 반복 적은 데이터엔 무용지물!"},

  {u:2,t:"용어매칭형",q:"'런 길이 부호화를 사용한 대표적인 이미지 파일 형식'은?",
   o:["JPEG","BMP","MP3","MPEG"],a:1,
   ec:"BMP는 런 길이 부호화를 사용하는 대표적 이미지 파일 형식입니다.",
   ef:"JPEG는 손실 압축, MP3는 음원, MPEG는 영상 압축. BMP만 RLE 사용!",
   tip:"BMP = RLE 사용 / JPEG = 손실 압축"},

  {u:2,t:"옳지않은것",q:"디지털 데이터의 압축에 대한 설명으로 옳지 <b>않은</b> 것은?",
   o:["압축한 데이터를 다시 원래대로 만드는 것을 복원이라고 한다","무손실 압축의 복원 데이터는 원본 데이터와 거의 같다","손실 압축의 복원 데이터는 원본 데이터와 차이가 있을 수 있다","손실 압축으로 압축한 데이터도 무손실로 복원 가능하다"],a:3,
   ec:"손실 압축은 데이터의 일부를 영구히 제거하므로, 무손실로 원본과 똑같이 복원할 수 없습니다.",
   ef:"한 번 손실된 데이터는 되돌릴 수 없다는 점이 핵심! '손실=영구'로 외우세요.",
   tip:"손실 압축 = 한번 잃으면 끝! 복원해도 원본과 다름"},

  {u:2,t:"사례분류형",q:"다음 중 무손실 압축이 적합한 사례를 모두 고른 것은?\n㉠ 텍스트 파일\n㉡ 은행 기록\n㉢ 음악 스트리밍\n㉣ 영화 동영상",
   o:["㉠, ㉡","㉢, ㉣","㉠, ㉢","㉡, ㉣"],a:0,
   ec:"텍스트와 은행 기록은 손실되면 안 되므로 무손실 압축이 적합. 음악·영화는 손실 압축이 효율적.",
   ef:"여러 항목을 묶는 문제는 모두 정확히 분류해야 함. '텍스트와 기록 = 무손실' 공식으로!",
   tip:"무손실: 텍스트·기록·코드 / 손실: 미디어(음악·영상·이미지)"},

  // ============ 단원 3: 알고리즘과 프로그래밍 (30문항) ============
  {u:3,t:"개념정의형",q:"파이썬의 자료형 중 '소수점이 없는 정수'를 표현하는 자료형은?",
   o:["int","float","str","bool"],a:0,
   ec:"int는 -100, 0, 100 등 소수점이 없는 정수를 표현하는 자료형입니다.",
   ef:"float는 '소수점 있는 실수', str은 '문자열', bool은 '참/거짓'. 정수는 int!",
   tip:"int=integer(정수) / float=실수(소수점) / str=string(문자열) / bool=참/거짓"},

  {u:3,t:"용어매칭형",q:"'True, False처럼 예/아니요로 판단하는 자료'를 표현하는 자료형은?",
   o:["int","float","str","bool"],a:3,
   ec:"bool 자료형은 True/False 두 값으로 참/거짓을 표현합니다.",
   ef:"True/False를 따옴표 없이 쓰면 bool, 따옴표를 붙이면 'True'(문자열) → str이 되니 주의!",
   tip:"bool = True/False(따옴표X) / 'True' = str(따옴표O)"},

  {u:3,t:"옳지않은것",q:"파이썬 변수명 생성 규칙으로 옳지 <b>않은</b> 것은?",
   o:["대소문자를 구별한다","숫자로 시작할 수 있다","공백과 특수 문자는 사용할 수 없다","if, while, for 등 예약어는 사용할 수 없다"],a:1,
   ec:"파이썬 변수명은 숫자로 <b>시작할 수 없습니다</b>. 단, 변수명 중간이나 끝에는 숫자 사용 가능.",
   ef:"'1var'은 X, 'var1'은 O! '시작할 수 있다/없다'를 정확히 구분하세요.",
   tip:"변수명 규칙: 알파벳/한글/_로 시작 / 숫자 시작 X / 예약어 X / 공백·특수문자 X"},

  {u:3,t:"코드예측형",q:"다음 코드의 출력 결과는?\n<code>x = 10\ny = 100\nx = x + 1\ny = y + x\nprint(x, y)</code>",
   o:["10 100","11 110","11 111","10 111"],a:2,
   ec:"x = 10 + 1 = 11. 그 다음 y = 100 + x(=11) = 111. 따라서 출력은 '11 111'.",
   ef:"y = y + x에서 x는 이미 11로 바뀐 상태! 'y = 100 + 10 = 110'으로 잘못 계산하지 않도록 주의.",
   tip:"대입은 순서대로! 변수가 갱신된 후 다음 줄에서는 새 값으로 사용됨."},

  {u:3,t:"용어매칭형",q:"파이썬에서 '한 번 생성하면 수정할 수 없는' 컨테이너형 자료형은?",
   o:["리스트(list)","튜플(tuple)","딕셔너리(dictionary)","집합(set)"],a:1,
   ec:"튜플은 괄호 ()로 묶어 저장하며, 한 번 생성하면 수정할 수 없는 자료형입니다.",
   ef:"리스트는 [ ], 딕셔너리는 { 키:값 }, 집합은 { } 형태. 모두 수정 가능하지만 튜플만 수정 불가!",
   tip:"튜플 = 수정 불가(불변) = ( ) / 리스트 = 수정 가능 = [ ]"},

  {u:3,t:"용어매칭형",q:"'{키:값}의 쌍으로 이루어지며 순서가 없는' 컨테이너형 자료형은?",
   o:["리스트","튜플","딕셔너리","집합"],a:2,
   ec:"딕셔너리는 {키:값} 쌍으로 데이터를 저장하며, 순서가 없습니다.",
   ef:"집합도 { }을 사용하지만 '키:값' 쌍이 아닌 단일 값들의 모임. 헷갈리지 마세요!",
   tip:"딕셔너리 = {키:값} 쌍 / 집합 = {값1, 값2} 단일값들"},

  {u:3,t:"코드예측형",q:"다음 코드의 출력 결과는?\n<code>a = 100\nprint(type(a))\na = 'Python'\nprint(type(a))</code>",
   o:["&lt;class 'int'&gt;가 두 번","&lt;class 'str'&gt;가 두 번","&lt;class 'int'&gt; 그 다음 &lt;class 'str'&gt;","오류 발생"],a:2,
   ec:"파이썬 변수는 새 값을 저장하면 자료형이 바뀝니다. 100은 int, 'Python'은 str.",

// ============ 상태 관리 ============
let state = {
  questions: [],
  filteredIdx: [],
  unitFilter: 'all',
  typeFilter: 'all',
  showBookmark: false,
  showWrong: false,
  answers: {},
  bookmarks: new Set(),
  wrongs: new Set(),
};

// ============ 초기화 ============
function init(){
  state.questions = QUESTIONS.map((q, i) => ({...q, _id: i}));
  applyFilter();
  renderQuiz();
  updateProgress();
  
  // 다크모드 토글
  document.getElementById('themeToggle').addEventListener('click', toggleTheme);
  
  // 단원 필터
  document.querySelectorAll('.chip[data-unit]').forEach(c => {
    c.addEventListener('click', () => {
      document.querySelectorAll('.chip[data-unit]').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      state.unitFilter = c.dataset.unit;
      applyFilter();
      renderQuiz();
    });
  });
  
  // 유형 필터
  document.querySelectorAll('.type-chip').forEach(c => {
    c.addEventListener('click', () => {
      document.querySelectorAll('.type-chip').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      state.typeFilter = c.dataset.type;
      applyFilter();
      renderQuiz();
    });
  });
  
  document.getElementById('bookmarkFilter').addEventListener('click', e => {
    state.showBookmark = !state.showBookmark;
    state.showWrong = false;
    e.target.classList.toggle('active', state.showBookmark);
    document.getElementById('wrongFilter').classList.remove('active');
    applyFilter();
    renderQuiz();
  });
  
  document.getElementById('wrongFilter').addEventListener('click', e => {
    state.showWrong = !state.showWrong;
    state.showBookmark = false;
    e.target.classList.toggle('active', state.showWrong);
    document.getElementById('bookmarkFilter').classList.remove('active');
    applyFilter();
    renderQuiz();
  });
  
  document.getElementById('shuffleBtn').addEventListener('click', () => {
    for (let i = state.filteredIdx.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [state.filteredIdx[i], state.filteredIdx[j]] = [state.filteredIdx[j], state.filteredIdx[i]];
    }
    renderQuiz();
  });
  
  document.getElementById('submitBtn').addEventListener('click', showResult);
  document.getElementById('resetBtn').addEventListener('click', () => {
    if(confirm('모든 답안과 진행상황을 초기화할까요?')) {
      state.answers = {};
      state.wrongs.clear();
      state.bookmarks.clear();
      document.getElementById('resultCard').classList.remove('show');
      renderQuiz();
      updateProgress();
    }
  });
}

function toggleTheme(){
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeToggle').textContent = isDark ? '🌙 다크모드' : '☀️ 라이트모드';
}

function applyFilter(){
  state.filteredIdx = state.questions
    .map((q, i) => ({q, i}))
    .filter(({q, i}) => {
      if(state.unitFilter !== 'all' && q.u != state.unitFilter) return false;
      if(state.typeFilter !== 'all' && q.t !== state.typeFilter) return false;
      if(state.showBookmark && !state.bookmarks.has(i)) return false;
      if(state.showWrong && !state.wrongs.has(i)) return false;
      return true;
    })
    .map(({i}) => i);
}

function unitName(u){
  return ['','컴퓨팅 시스템','데이터','알고리즘과 프로그래밍','인공지능','정보 보호와 보안','코드 보너스'][u] || '';
}

function renderQuiz(){
  const container = document.getElementById('quizContainer');
  document.getElementById('resultCard').classList.remove('show');
  
  if(state.filteredIdx.length === 0){
    container.innerHTML = '<div class="empty">📭 표시할 문제가 없어요. 필터를 조정해보세요!</div>';
    updateProgress();
    return;
  }
  
  container.innerHTML = state.filteredIdx.map((idx, displayNum) => {
    const q = state.questions[idx];
    const userAns = state.answers[idx];
    const answered = userAns !== undefined;
    const correct = answered && userAns === q.a;
    const bookmarked = state.bookmarks.has(idx);
    
    return `
      <div class="quiz-card ${answered ? 'answered' : ''} ${correct ? 'correct' : answered ? 'wrong' : ''}" data-idx="${idx}">
        <div class="q-header">
          <div class="q-meta">
            <span class="badge badge-num">#${displayNum + 1}</span>
            <span class="badge badge-unit">${q.u}. ${unitName(q.u)}</span>
            <span class="badge badge-type">${q.t}</span>
          </div>
          <button class="bookmark-btn ${bookmarked ? 'active' : ''}" onclick="toggleBookmark(${idx})">${bookmarked ? '⭐' : '☆'}</button>
        </div>
        <div class="q-text">${q.q}</div>
        <div class="options">
          ${q.o.map((opt, i) => {
            let cls = 'option';
            if(answered){
              cls += ' disabled';
              if(i === q.a) cls += ' correct';
              else if(i === userAns) cls += ' wrong';
            } else if(userAns === i) {
              cls += ' selected';
            }
            return `
              <div class="${cls}" onclick="${answered ? '' : `selectAnswer(${idx}, ${i})`}">
                <div class="option-num">${i+1}</div>
                <div class="option-text">${opt}</div>
              </div>
            `;
          }).join('')}
        </div>
        <div class="explanation ${answered ? 'show' : ''}">
          <div class="exp-section exp-correct">
            <div class="exp-title">✅ 정답 풀이</div>
            <div class="exp-content">${q.ec}</div>
          </div>
          <div class="exp-section exp-confuse">
            <div class="exp-title">⚠️ 헷갈리는 선지 분석</div>
            <div class="exp-content">${q.ef}</div>
          </div>
          <div class="exp-section exp-tip">
            <div class="exp-title">💡 시험장 판단 꿀팁</div>
            <div class="exp-content">${q.tip}</div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function selectAnswer(idx, choice){
  state.answers[idx] = choice;
  const q = state.questions[idx];
  if(choice === q.a){
    state.wrongs.delete(idx);
  } else {
    state.wrongs.add(idx);
  }
  renderQuiz();
  updateProgress();
}

function toggleBookmark(idx){
  if(state.bookmarks.has(idx)) state.bookmarks.delete(idx);
  else state.bookmarks.add(idx);
  renderQuiz();
}

function updateProgress(){
  const total = state.filteredIdx.length;
  const answered = state.filteredIdx.filter(i => state.answers[i] !== undefined).length;
  const correct = state.filteredIdx.filter(i => state.answers[i] === state.questions[i].a).length;
  const wrong = answered - correct;
  
  document.getElementById('progressText').textContent = `${answered} / ${total}`;
  document.getElementById('correctText').textContent = correct;
  document.getElementById('wrongText').textContent = wrong;
  document.getElementById('progressFill').style.width = total > 0 ? `${(answered/total)*100}%` : '0%';
}

function showResult(){
  const total = state.filteredIdx.length;
  const answered = state.filteredIdx.filter(i => state.answers[i] !== undefined).length;
  const correct = state.filteredIdx.filter(i => state.answers[i] === state.questions[i].a).length;
  
  if(answered === 0){
    alert('아직 푼 문제가 없어요!');
    return;
  }
  
  const percentage = Math.round((correct / answered) * 100);
  let grade = '🥉';
  let comment = '조금 더 분발해보세요!';
  if(percentage >= 90){grade = '🏆'; comment = '완벽해요! 시험장에서도 자신있게!'}
  else if(percentage >= 80){grade = '🥇'; comment = '훌륭해요! 거의 다 왔어요.'}
  else if(percentage >= 70){grade = '🥈'; comment = '좋아요! 오답 노트를 한번 더 풀어봐요.'}
  else if(percentage >= 60){grade = '🥉'; comment = '괜찮아요. 헷갈렸던 부분을 다시 보세요.'}
  
  // 단원별 통계
  const unitStats = {};
  for(let u = 1; u <= 6; u++){
    const unitQs = state.filteredIdx.filter(i => state.questions[i].u === u);
    if(unitQs.length === 0) continue;
    const unitCorrect = unitQs.filter(i => state.answers[i] === state.questions[i].a).length;
    const unitAnswered = unitQs.filter(i => state.answers[i] !== undefined).length;
    unitStats[u] = {total: unitQs.length, answered: unitAnswered, correct: unitCorrect};
  }
  
  const unitStatsHtml = Object.entries(unitStats).map(([u, s]) => `
    <div class="unit-stat">
      <div class="name">${u}. ${unitName(parseInt(u))}</div>
      <div class="score">${s.correct}/${s.total}</div>
    </div>
  `).join('');
  
  document.getElementById('resultCard').innerHTML = `
    <div style="font-size:48px">${grade}</div>
    <div class="result-score">${percentage}점</div>
    <div class="result-detail">
      ${answered}문제 중 <strong style="color:var(--success)">${correct}문제</strong> 정답!<br>
      <span style="color:var(--text-soft);font-size:13px;margin-top:8px;display:inline-block">${comment}</span>
    </div>
    <div class="unit-stats">${unitStatsHtml}</div>
    <button class="btn btn-secondary" onclick="document.getElementById('wrongFilter').click(); document.getElementById('resultCard').classList.remove('show'); window.scrollTo(0,0);">❌ 틀린 문제만 다시 풀기</button>
  `;
  document.getElementById('resultCard').classList.add('show');
  document.getElementById('resultCard').scrollIntoView({behavior:'smooth'});
}

// 시작
init();
</script>
</body>
</html>
